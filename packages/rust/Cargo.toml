[package]
name = "danh-ngon"
version = "1.0.0"
edition = "2021"
rust-version = "1.70"
description = "Kho danh ngôn song ngữ Việt–Anh (9.000+ câu) đóng gói sẵn, không cần mạng. Tìm theo chủ đề, tác giả, từ khoá."
license = "MIT"
keywords = ["danh-ngon", "quotes", "vietnamese", "bilingual", "tieng-viet"]
categories = ["text-processing", "internationalization"]
readme = "README.md"
repository = "https://github.com/trananhtung/danh-ngon"
homepage = "https://github.com/trananhtung/danh-ngon"
include = ["src/**/*", "data/quotes.json", "data/topics.json", "data/meta.json", "README.md", "LICENSE"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
